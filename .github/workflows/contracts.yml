name: Contracts

on:
  push:
    branches: [main]
    paths:
      - "packages/contracts/**"
  pull_request:
    branches: [main]
    paths:
      - "packages/contracts/**"

jobs:
  test:
    name: Forge Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - run: forge build --sizes
      - run: forge test -vvv
      - run: forge test --gas-report
