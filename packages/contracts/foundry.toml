[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200

remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/",
]

[fuzz]
runs = 256

[invariant]
runs = 256
depth = 15

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
